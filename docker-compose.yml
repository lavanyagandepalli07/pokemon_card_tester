version: '3.9'

# Minimal docker-compose for local development: MongoDB only.
# Optional services (mongo-express, redis) were removed to simplify the stack.
services:
  mongodb:
    image: mongo:7-alpine
    container_name: pokemon-card-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: pokemon_card_auth
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.runCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pokemon-card-network

volumes:
  mongodb_data:

networks:
  pokemon-card-network:
    driver: bridge
